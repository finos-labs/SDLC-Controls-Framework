name: Readiness Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      scope:
        description: Report scope
        required: true
        default: full
        type: choice
        options:
          - full
          - changed

permissions:
  contents: read

jobs:
  readiness-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependency
        run: python -m pip install PyYAML

      - name: Select readiness scope
        id: scope
        shell: bash
        run: |
          mkdir -p .artifacts

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            scope="${{ inputs.scope }}"
            if [[ "$scope" == "changed" ]]; then
              base_sha="$(git merge-base HEAD origin/${{ github.event.repository.default_branch }})"
              head_sha="$(git rev-parse HEAD)"
            else
              base_sha=""
              head_sha=""
            fi
          else
            scope="changed"
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          fi

          {
            echo "scope=$scope"
            echo "base_sha=$base_sha"
            echo "head_sha=$head_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Collect changed documents
        id: changed
        if: steps.scope.outputs.scope == 'changed'
        shell: bash
        run: |
          mapfile -t files < <(
            git diff --name-only "${{ steps.scope.outputs.base_sha }}" "${{ steps.scope.outputs.head_sha }}" \
              | grep -E '^docs/(_risks|_mitigations)/.*\.md$' || true
          )

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ ${#files[@]} -eq 0 ]]; then
            {
              echo "## Readiness Check"
              echo
              echo "Scope: changed files only"
              echo
              echo "No changed risk or mitigation documents were found in this pull request."
            } > .artifacts/readiness-report.md
          fi

      - name: Run scoped readiness report
        if: steps.scope.outputs.scope == 'changed' && steps.changed.outputs.files != ''
        shell: bash
        run: |
          mapfile -t files <<'EOF'
          ${{ steps.changed.outputs.files }}
          EOF
          python3 scripts/readiness-check --files "${files[@]}" --report .artifacts/readiness-report.md

      - name: Run full readiness report
        if: steps.scope.outputs.scope == 'full'
        run: python3 scripts/readiness-check --report .artifacts/readiness-report.md

      - name: Publish job summary
        run: cat .artifacts/readiness-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload readiness report
        uses: actions/upload-artifact@v4
        with:
          name: readiness-report
          path: .artifacts/readiness-report.md
