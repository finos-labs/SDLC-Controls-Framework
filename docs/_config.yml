title: SDLC³- SDLC Common Controls Catalog

version: pre-alpha
release-date: 2025-09-23
baseurl: "/SDLC-Controls-Framework"

risk_classification:
  OP: Operational
  SEC: Security
  RC: Regulatory and Compliance
  BUS: Business

mitigation_classification:
  PREV: Preventative
  DET: Detective

# SDLC phase at which a mitigation primarily operates. LIFECYCLE is the
# cross-cutting bucket for governance/process controls that are not tied to a
# single phase. Used by the catalogue phase filter.
phase_classification:
  CODE: Code
  BUILD: Build
  RELEASE: Release
  RUNTIME: Runtime
  LIFECYCLE: Lifecycle

# Bootstrap Icons class for each classification code, used by the catalogue
# headings and filter checkboxes. Adding a new code above requires adding the
# matching icon here.
category_icons:
  OP: bi-person-fill-gear
  SEC: bi-bug-fill
  RC: bi-clipboard2-check-fill
  BUS: bi-briefcase-fill
  PREV: bi-lock-fill
  DET: bi-eye-fill
  CODE: bi-code-slash
  BUILD: bi-hammer
  RELEASE: bi-rocket-takeoff-fill
  RUNTIME: bi-play-circle-fill
  LIFECYCLE: bi-arrow-repeat

document_status:
  - name: Pre-Draft
    description: "Initial brainstorming or collection of ideas, notes, and outlines. The document is not yet formally written."
  - name: Draft
    description: "The document is in the early stages of development, with content being written and structured but not yet polished."
  - name: Working-Group-Approved
    description: "The document is in its final form and has been approved by the working group."

# FFIEC IT Booklet abbreviations mapping
ffiec_itbooklet_abbreviations:
  architecture-infrastructure-and-operations: aio
  archived-booklets: arc
  audit: aud
  business-continuity-management: bcm
  development-acquisition-and-maintenance: dam
  information-security: sec
  management: mgt
  outsourcing-technology-services: ots
  retail-payment-systems: rps
  supervision-of-technology-service-providers: tsp
  wholesale-payment-systems: wps

collections:
  risks:
    output: true
  mitigations:
    output: true
